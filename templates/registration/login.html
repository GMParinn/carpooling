{% extends 'base.html' %}
{% block title %}Login — CarPoolNet{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <i class="bi bi-car-front-fill text-primary" style="font-size:3rem"></i>
      <h2 class="fw-bold mt-2">Welcome back</h2>
      <p class="text-muted">Sign in to CarPoolNet</p>
    </div>
    <div class="card p-4">
      {% if error %}
        <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
      <hr>
      <p class="text-center text-muted small mb-0">
        Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
