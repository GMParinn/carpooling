version: '3.9'

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: carpooling
      POSTGRES_USER: carpooling
      POSTGRES_PASSWORD: carpooling_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpooling"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn carpooling.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    volumes:
      - .:/app
      - static_volume_dev:/app/staticfiles
    expose:
      - 8000
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-not-for-production"
      ALLOWED_HOSTS: "localhost 127.0.0.1"
      POSTGRES_DB: carpooling
      POSTGRES_USER: carpooling
      POSTGRES_PASSWORD: carpooling_dev
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume_dev:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data_dev:
  static_volume_dev:
