version: '3.9'

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carpooling}
      POSTGRES_USER: ${POSTGRES_USER:-carpooling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carpooling_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carpooling}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn carpooling.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - 8000
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost 127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-carpooling}
      POSTGRES_USER: ${POSTGRES_USER:-carpooling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carpooling_secret}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      FARE_BASE_FEE: ${FARE_BASE_FEE:-2.00}
      FARE_UNIT_PRICE: ${FARE_UNIT_PRICE:-1.50}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  static_volume:
  certbot_conf:
  certbot_www:
